{% set name = "flask-mail" %}
{% set version = "0.10.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/flask_mail-{{ version }}.tar.gz
  sha256: 44083e7b02bbcce792209c06252f8569dd5a325a7aaa76afe7330422bd97881d

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - flit-core <4
  run:
    - python >={{ python_min }}
    - flask
    - blinker

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - flask_mail
  commands:
    - pip check

about:
  home: https://pythonhosted.org/Flask-Mail/
  license: BSD 3-Clause
  license_file: LICENSE
  license_family: BSD
  summary: 'Flask extension for sending email'
  doc_url: https://pythonhosted.org/Flask-Mail/
  dev_url: https://github.com/mattupstate/flask-mail

extra:
  recipe-maintainers:
    - pmlandwehr
    - synapticarbors
