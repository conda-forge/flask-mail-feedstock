{% set name = "flask-mail" %}
{% set camelName = "Flask-Mail" %}
{% set version = "0.10.0" %}
{% set hash_val = "44083e7b02bbcce792209c06252f8569dd5a325a7aaa76afe7330422bd97881d" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: {{ hash_val }}

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python
    - pip

  run:
    - python
    - flask
    - blinker

test:
  imports:
    - flask_mail

about:
  home: https://pythonhosted.org/Flask-Mail/
  license: BSD 3-Clause
  license_file: LICENSE
  license_family: BSD
  summary: 'Flask extension for sending email'
  doc_url: https://pythonhosted.org/Flask-Mail/
  dev_url: https://github.com/mattupstate/flask-mail

extra:
  recipe-maintainers:
    - pmlandwehr
